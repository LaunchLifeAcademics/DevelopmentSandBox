<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pitman Flashcard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --pitman-blue: #004b8d;
      --pitman-blue-light: #0867b8;
      --pitman-grey-light: #f5f5f7;
      --pitman-text-dark: #1b1b1f;
      --pitman-radius-pill: 999px;
      --card-width: 320px;
      --card-height: 200px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      background: radial-gradient(circle at top, #e7f1fb 0, #ffffff 60%);
      color: var(--pitman-text-dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page {
      width: 100%;
      max-width: 960px;
      padding: 24px 16px 40px;
    }

    .brand-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      gap: 16px;
    }

    .brand-logo {
      height: 52px;
      width: auto;
      display: block;
    }

    .page-title {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--pitman-blue);
      text-align: right;
    }

    .flashcard-shell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }
