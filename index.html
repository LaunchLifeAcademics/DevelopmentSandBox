<script>
  const flashcards = [
    {
      question: "What does HTML stand for?",
      answer: "HyperText Markup Language – the standard language for creating web pages."
    },
    {
      question: "What does CSS control in a web page?",
      answer: "The visual presentation – layout, colours, fonts, spacing and overall look-and-feel."
    },
    {
      question: "Name one advantage of self-paced training.",
      answer: "You can study at times that suit you, revisiting topics until you are confident."
    },
    {
      question: "What is a responsive website?",
      answer: "A site that adapts its layout so it remains usable on mobiles, tablets and desktops."
    }
  ];

  const flashcardEl = document.getElementById("flashcard");
  const questionEl = document.getElementById("card-question");
  const answerEl = document.getElementById("card-answer");
  const flipBtn = document.getElementById("flip-btn");
  const nextBtn = document.getElementById("next-btn");
  const prevBtn = document.getElementById("prev-btn");
  const finishedMessageEl = document.getElementById("finished-message");

  let currentIndex = 0;
  let finished = false;

  function renderCard(index) {
    if (!flashcards.length) {
      questionEl.textContent = "No flashcards available.";
      answerEl.textContent = "";
      nextBtn.disabled = true;
      prevBtn.disabled = true;
      flipBtn.disabled = true;
      return;
    }

    if (index < 0) index = 0;
    if (index >= flashcards.length) index = flashcards.length - 1;

    const card = flashcards[index];
    questionEl.textContent = card.question;
    answerEl.textContent = card.answer;

    // Update button states
    prevBtn.disabled = index === 0;
    nextBtn.disabled = false;
    finished = false;
    finishedMessageEl.style.display = "none";
    flashcardEl.style.opacity = "1";
    flipBtn.disabled = false;

    if (index === flashcards.length - 1) {
      nextBtn.textContent = "Finish";
    } else {
      nextBtn.textContent = "Next example";
    }
  }

  function flipCard() {
    if (finished) return;
    flashcardEl.classList.toggle("is-flipped");
  }

  // Redirect removed – this function no longer exists:
  // function goToNextLmsPage() { ... }

  function nextCard() {
    if (finished) return;

    flashcardEl.classList.remove("is-flipped");

    if (currentIndex < flashcards.length - 1) {
      currentIndex++;
      renderCard(currentIndex);
    } else {
      // Last card: mark finished, but do NOT redirect
      finished = true;
      flashcardEl.style.opacity = "0.4";
      flipBtn.disabled = true;
      nextBtn.disabled = true;
      prevBtn.disabled = true;
      finishedMessageEl.style.display = "block";
      // No setTimeout or window.location here
    }
  }

  function prevCard() {
    if (finished) return;

    flashcardEl.classList.remove("is-flipped");

    if (currentIndex > 0) {
      currentIndex--;
      renderCard(currentIndex);
    }
  }

  flashcardEl.addEventListener("click", flipCard);
  flipBtn.addEventListener("click", flipCard);
  nextBtn.addEventListener("click", nextCard);
  prevBtn.addEventListener("click", prevCard);

  renderCard(currentIndex);
</script>
